<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400">
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }</style>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>
  <rect width="960" height="400" fill="#ffffff"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Monitoring Architecture — Prometheus and Grafana</text>
  <rect x="60" y="100" width="190" height="54" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="155" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">FastAPI Backend</text>
  <text x="155" y="142" text-anchor="middle" font-size="11" fill="#6b7280">:8000/metrics</text>
  <rect x="60" y="186" width="190" height="54" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="155" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Airflow Webserver</text>
  <text x="155" y="228" text-anchor="middle" font-size="11" fill="#6b7280">:8080/admin/metrics</text>
  <rect x="60" y="272" width="190" height="54" rx="8" fill="#faf5ff" stroke="#ede9fe" stroke-width="1.5"/>
  <text x="155" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">MLflow Server</text>
  <text x="155" y="314" text-anchor="middle" font-size="11" fill="#6b7280">:5000/metrics</text>
  <rect x="60" y="358" width="190" height="54" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="155" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Nginx Exporter</text>
  <text x="155" y="400" text-anchor="middle" font-size="11" fill="#6b7280">:9113/metrics</text>
  <rect x="320" y="170" width="160" height="80" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="400" y="206" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">Prometheus</text>
  <text x="400" y="224" text-anchor="middle" font-size="11" fill="#6b7280">port 9090</text>
  <text x="400" y="242" text-anchor="middle" font-size="11" fill="#6b7280">scrape interval: 15s</text>
  <rect x="580" y="150" width="180" height="120" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="670" y="196" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Grafana</text>
  <text x="670" y="214" text-anchor="middle" font-size="11" fill="#6b7280">port 3001</text>
  <text x="670" y="230" text-anchor="middle" font-size="11" fill="#6b7280">Inference dashboard</text>
  <text x="670" y="246" text-anchor="middle" font-size="11" fill="#6b7280">Model drift dashboard</text>
  <text x="670" y="262" text-anchor="middle" font-size="11" fill="#6b7280">Pipeline dashboard</text>
  <rect x="800" y="190" width="140" height="60" rx="8" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="870" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#713f12">Alert Rules</text>
  <text x="870" y="234" text-anchor="middle" font-size="10" fill="#6b7280">error rate, latency, drift</text>
  <line x1="250" y1="127" x2="320" y2="210" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="250" y1="213" x2="320" y2="210" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="250" y1="299" x2="320" y2="210" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="250" y1="385" x2="320" y2="210" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="480" y1="210" x2="580" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="502" y="202" width="56" height="15" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="530" y="214" text-anchor="middle" font-size="11" fill="#2563eb">PromQL</text>
  <line x1="760" y1="220" x2="800" y2="220" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
</svg>