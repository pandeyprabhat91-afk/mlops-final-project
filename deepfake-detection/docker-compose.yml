version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "60"
    AIRFLOW__WEBSERVER__WORKERS: "1"
    AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL: "1800"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

networks:
  deepfake-net:
    driver: bridge

volumes:
  postgres-data:
  mlflow-data:
  grafana-data:
  prometheus-data:
  torch-hub-cache:

services:
  postgres:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [deepfake-net]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    mem_limit: 256m
    mem_reservation: 128m
    command: postgres -c shared_buffers=64MB -c max_connections=50

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:///mlflow/mlruns
      --default-artifact-root file:///mlflow/mlruns
      --allowed-hosts '*'
    volumes:
      - ./mlruns:/mlflow/mlruns
    ports: ["5000:5000"]
    networks: [deepfake-net]
    mem_limit: 512m
    mem_reservation: 256m

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports: ["8080:8080"]
    networks: [deepfake-net]
    mem_limit: 768m
    mem_reservation: 512m

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    networks: [deepfake-net]
    mem_limit: 512m
    mem_reservation: 256m

  airflow-init:
    <<: *airflow-common
    restart: "no"
    command: >
      bash -c "airflow db migrate && airflow users create
      --username admin --password admin
      --firstname Admin --lastname User
      --role Admin --email admin@example.com || true"
    networks: [deepfake-net]
    mem_limit: 512m

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    networks: [deepfake-net]
    env_file: .env
    volumes:
      - ./mlruns:/workspace/mlruns
      - torch-hub-cache:/root/.cache/torch
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3
    mem_limit: 2g
    mem_reservation: 1g

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    networks: [deepfake-net]
    depends_on: [backend]
    mem_limit: 64m
    mem_reservation: 32m

  prometheus:
    image: prom/prometheus:v2.50.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    networks: [deepfake-net]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=512MB'
    mem_limit: 384m
    mem_reservation: 256m

  # node-exporter: disabled on Windows Docker Desktop (WSL2 does not expose host /proc//sys)
  # Re-enable on Linux hosts by uncommenting below.
  # node-exporter:
  #   image: prom/node-exporter:v1.7.0
  #   volumes:
  #     - /proc:/host/proc:ro
  #     - /sys:/host/sys:ro
  #     - /:/rootfs:ro
  #   command:
  #     - '--path.procfs=/host/proc'
  #     - '--path.sysfs=/host/sys'
  #     - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
  #   ports: ["9100:9100"]
  #   networks: [deepfake-net]

  grafana:
    image: grafana/grafana:10.3.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_HTTP_ADDR: 0.0.0.0
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports: ["3001:3000"]
    networks: [deepfake-net]
    depends_on: [prometheus]
    mem_limit: 256m
    mem_reservation: 128m
