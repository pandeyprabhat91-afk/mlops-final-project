name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install black==24.3.0 flake8==7.0.0 isort==5.13.2
      - run: black --check backend/ ml/ tests/
      - run: flake8 backend/ ml/ tests/
      - run: isort --check backend/ ml/ tests/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: pip install -r ml/requirements.txt
      - run: pytest tests/unit/ -v --tb=short --cov=backend/app --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: coverage.xml

  dvc-repro:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dvc==3.48.4
      - run: dvc repro --dry  # verify DAG integrity without running

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: pytest tests/integration/ -v --tb=short --cov=backend/app --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: integration-test-coverage
          path: coverage.xml

  build-docker:
    runs-on: ubuntu-latest
    needs: [dvc-repro, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - run: docker build ./backend -t deepfake-backend:ci
      - run: docker build ./frontend -t deepfake-frontend:ci
