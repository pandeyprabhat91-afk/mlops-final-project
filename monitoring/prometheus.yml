global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # FastAPI backend — always running, exposes deepfake_* metrics
  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: deepfake-backend
          environment: docker
    metrics_path: /metrics

  # Airflow — only available when Airflow stack is running
  - job_name: airflow
    static_configs:
      - targets: ["airflow-webserver:8080"]
        labels:
          service: airflow
          environment: docker
    metrics_path: /admin/metrics

  # node-exporter disabled on Windows Docker Desktop — WSL2 doesn't expose host /proc.
  # Re-enable on Linux: add node-exporter service back to docker-compose.yml and uncomment:
  # - job_name: node-exporter
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
